<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png" sizes="108x108">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>OMORI Photo Album</title>
<style>
  @font-face {
    font-family: 'OMORI';
    src: url('assets/ui/OMORI_GAME2.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    font-family: 'OMORI', sans-serif;
  }

  /* ── Pixel-art rendering ── */
  img, canvas { image-rendering: pixelated; }
  /* Photos contain hand-drawn detail, not crisp pixel art — pixelated at fractional
     scene scale produces ugly blocky/uneven artifacts. Use bilinear smoothing instead. */
  #viewer-photo, .photo-slot img { image-rendering: auto; }

  /* ── Parallax ── */
  #parallax-bg {
    position: fixed; inset: 0; z-index: 0;
    background-size: auto 100%; background-repeat: repeat-x;
    background-image: url('assets/ui/Faraway_polaroidBG_FA_day.png');
  }
  /* Hide parallax layers on select screen (select-bg takes over) */
  body.on-select #parallax-bg,
  body.on-select #parallax-fg { display: none; }
  #parallax-fg {
    position: fixed; inset: 0;
    z-index: 1;
    background-size: auto 100%; background-repeat: repeat-x;
    pointer-events: none;
  }

  /* ── Select screen stage (scales as one unit with cover+crop) ── */
  #select-stage {
    position: fixed;
    left: 50%; top: 50%;
    width: 1280px; height: 720px;
    transform: translate(-50%, -50%) scale(var(--select-scale, 1));
    transform-origin: center center;
    z-index: 99;
  }
  /* When not on select screen, let clicks pass through to the game viewport */
  body:not(.on-select) #select-stage { pointer-events: none; }
  /* ── Album select ── */
  #album-select {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 40px;
  }
  /* Select screen background — always fills the whole window */
  #select-bg {
    position: fixed; inset: 0; z-index: 98;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(3px) brightness(0.6);
    transform: scale(1.02);
    transition: opacity 0.3s;
  }
  /* BlackSpace cover: tile the parallax sky and animate it via JS (drift toward
     the lower-left, matching Scene_OmoriTitleScreen.update in the original game). */
  body.on-select-bs #select-bg {
    background-size: auto;
    background-repeat: repeat;
  }
  #select-gif {
    position: fixed; z-index: 99;
    bottom: -2px; left: 50%;
    transform: translateX(-50%) scale(calc(1.5 * var(--select-scale, 1)));
    transform-origin: bottom center;
    opacity: 1;
    filter: blur(3px) brightness(0.6);
    transition: opacity 0.3s;
  }
  #select-bg-fade {
    position: fixed; inset: 0; z-index: 99;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  #select-bg-fade.active { opacity: 1; }
  #album-select h1 { color: #fff; font-size: 30px; letter-spacing: 4px; }
  .album-covers { display: flex; gap: 50px; }
  .album-cover-btn {
    text-align: center;
    transition: transform 0.2s;
  }
  .album-cover-btn.selected { transform: scale(1.08); }
  .album-cover-btn canvas { height: 240px; width: auto; }
  .album-cover-label { color: #ccc; margin-top: 5px; font-size: 16px; letter-spacing: 1px; }
  .album-cover-btn.selected .album-cover-label { color: #fff; }
  /* Stage roller (above each album cover) — click triangles to switch */
  .stage-roller {
    width: 100%;
    height: 32px;
    margin-bottom: 10px;
    display: flex; flex-direction: row;
    align-items: center; justify-content: center;
    gap: 14px;
    color: #fff; font-size: 15px; letter-spacing: 2px;
    text-align: center;
    transform: translateY(14px);
  }
  .stage-arrow {
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }
  .stage-left  { border-right: 10px solid #fff; margin-right: -25px; }
  .stage-right { border-left:  10px solid #fff; margin-left:  -25px; }
  .stage-left:hover  { border-right-color: #ffcc66; }
  .stage-right:hover { border-left-color:  #ffcc66; }
  .stage-left.disabled  { border-right-color: #3a3a3a; cursor: default; pointer-events: none; }
  .stage-right.disabled { border-left-color:  #3a3a3a; cursor: default; pointer-events: none; }
  .stage-current {
    min-width: 140px;
    font-weight: bold;
    transition: color 0.15s;
    pointer-events: none;
  }
  .album-cover-btn:not(.selected) .stage-roller { opacity: 0.55; }
  .album-cover-btn:not(.selected) .stage-current { color: #bbb; }
  .select-cursor {
    width: 38px; height: 22px;
    margin: 20px auto 0;
    visibility: hidden;
    transform: rotate(-90deg);
  }
  .album-cover-btn.selected .select-cursor { visibility: visible; }
  .select-hint {
    color: #fff; font-size: 18px; letter-spacing: 1px; text-align: center; line-height: 1.5;
  }

  /* ── Game viewport (640x480 scaled) ── */
  #game-viewport {
    position: fixed; inset: 0; z-index: 10;
    display: none; align-items: center; justify-content: center;
  }
  /* When in album, reserve top space for the fixed legend bar so the scene centers below it */
  body.in-album #game-viewport { top: calc(30px * var(--scale, 1)); }
  #scene {
    position: relative;
    width: 640px; height: 480px;
    flex: none; /* prevent flexbox from shrinking the 640x480 DOM box */
    transform-origin: center center;
    overflow: visible;
  }
  /* Game-accurate easings (Object_Movement.easeInCirc/easeOutCirc from Omori BASE.js L5475) */
  :root {
    --ease-out-circ: cubic-bezier(0, 0.55, 0.45, 1);
    --ease-in-circ:  cubic-bezier(0.55, 0, 1, 0.45);
  }

  /* ── Legend bar (top HUD) ── */
  /* Legend bar is fixed to the viewport top (full width), scales its height/text via --scale */
  #legend-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: calc(30px * var(--scale, 1));
    background: #000;
    border-bottom: calc(3px * var(--scale, 1)) solid #fff;
    display: none;
    align-items: center; justify-content: center;
    z-index: 30;
    /* Game: legend tween 25 frames (0.42s), easeOutCirc (both hide and show) */
    transition: opacity 0.42s var(--ease-out-circ), transform 0.42s var(--ease-out-circ);
  }
  body.in-album #legend-bar { display: flex; }
  #legend-bar-inner {
    width: calc(410px * var(--scale, 1));
    display: flex; align-items: center; justify-content: space-between;
  }
  .legend-item {
    display: flex; align-items: center;
    gap: calc(6px * var(--scale, 1));
    color: #fff;
    font-size: calc(23px * var(--scale, 1));
    letter-spacing: calc(1px * var(--scale, 1));
    cursor: pointer;
  }
  .legend-icon {
    height: calc(24px * var(--scale, 1));
    image-rendering: pixelated;
    vertical-align: middle;
  }

  /* ── Album book ── */
  #album-book {
    position: absolute;
    transition: transform 0.4s cubic-bezier(0.33,1,0.68,1),
                opacity 0.3s;
  }
  #book-bg { display: block; }
  /* FA book-bg already has aging baked in from the source image, no extra filter needed */
  #page-text-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.7;
    pointer-events: none;
  }

  /* ── Photo thumbnails on book ── */
  .photo-slot {
    position: absolute;
    width: 86px; height: 101px;
    cursor: pointer;
  }
  .photo-slot img { width: 100%; height: 100%; }
  /* Slow fade-in for the just-discovered easter egg photo */
  .photo-slot.fade-in-egg img {
    animation: fade-in-egg 2.5s ease-out;
  }
  @keyframes fade-in-egg {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  /* ── Hand cursor ── */
  #hand-cursor {
    position: absolute;
    z-index: 25;
    pointer-events: none;
    transition: left 0.12s cubic-bezier(0.33,1,0.68,1),
                top 0.12s cubic-bezier(0.33,1,0.68,1),
                transform 0.3s cubic-bezier(0.33,1,0.68,1),
                opacity 0.35s;
  }
  /* Inactive state (reading a description): matches OMORI's exact
     setColorTone([-80,-80,-80,255]) — fully desaturated then RGB subtract 80/255 */
  #hand-cursor.inactive {
    filter: grayscale(100%) url(#omori-tone-dark);
  }

  /* ── Page turn controls (game-accurate) ── */
  .page-turn-group {
    position: absolute;
    z-index: 20;
    width: 58px; height: 58px;
    background: #000;
    border: 3px solid #fff;
    outline: 1px solid #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1px;
    transition: opacity 0.3s;
    cursor: pointer;
  }
  .page-turn-group.disabled { pointer-events: none; cursor: default; }
  /* Key icon image (24x24 from game assets) */
  .page-key-icon {
    width: 24px; height: 24px;
    image-rendering: pixelated;
    position: relative;
    top: 3px;
  }
  /* Hand inside the outer box */
  .page-turn-hand {
    image-rendering: pixelated;
    position: relative;
    top: -3px;
    transition: filter 0.2s;
  }

  /* ── Scene transition overlay ── */
  #scene-transition {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s linear;
  }
  #scene-transition.active {
    opacity: 1;
    pointer-events: all;
  }

  /* "Something" eye — bottom-left, hover to reveal, click to toggle BS visibility */
  #something-corner {
    position: fixed;
    bottom: 0; left: 0;
    width: 60px; height: 70px;
    z-index: 200;
    pointer-events: none; /* invisible zone; only the eye captures clicks */
  }
  #something-eye {
    position: absolute;
    bottom: 12px; left: 14px;
    width: 9px; height: 30px;     /* ~1/3 of native 26×89 */
    image-rendering: pixelated;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    cursor: pointer;
  }
  /* Eye is always present on the select screen; only the hover state surfaces it.
     Clicking toggles bs-locked so the user can hide/show BS at any time. */
  body.on-select #something-corner { pointer-events: auto; }
  body.on-select #something-corner:hover #something-eye {
    opacity: 1;
    pointer-events: auto;
  }
  /* Locked: hide the BS cover button so DW/FA appear as the only choices */
  body.bs-locked .album-cover-btn[data-album="blackspace"] { display: none; }
  /* BS has no stages — hide its (empty) stage roller but keep the layout slot */
  .album-cover-btn[data-album="blackspace"] .stage-roller { visibility: hidden; }

  /* ── Music toggle button ── */
  #music-toggle {
    position: fixed;
    top: 16px; left: 16px;
    width: 40px; height: 40px;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    z-index: 200;
    cursor: pointer;
  }
  #music-toggle:hover { background: rgba(0,0,0,0.85); border-color: rgba(255,255,255,0.6); }
  #music-toggle svg { width: 22px; height: 22px; }
  .music-slash {
    position: absolute;
    top: 50%; left: 50%;
    width: 34px; height: 3px;
    background: #e44;
    transform: translate(-50%, -50%) rotate(-45deg);
    border-radius: 1px;
    transition: opacity 0.2s;
  }
  #music-toggle.playing .music-slash { opacity: 0; }
  body.on-select #music-toggle { display: flex; }

  /* ── Page flip overlay ── */
  #page-flip {
    position: absolute;
    top: 0;
    height: 100%;
    z-index: 5;
    pointer-events: none;
    display: none;
    overflow: hidden;
  }
  #page-flip canvas {
    image-rendering: pixelated;
  }

  /* ── Photo info bar (bottom) ── */
  #photo-info-bar {
    position: absolute;
    bottom: 0; left: 0;
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    padding: 6px 16px;
    font-size: 14px;
    letter-spacing: 1px;
    z-index: 25;
    white-space: nowrap;
    display: none;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* ── Full photo viewer ── */
  #viewer {
    position: absolute; inset: 0;
    z-index: 35;
    display: none;
  }
  #viewer.active { display: block; }

  #viewer-photo {
    position: absolute;
    left: 50%; top: 50%;
    transition: transform 0.45s cubic-bezier(0.33,1,0.68,1),
                opacity 0.15s;
    will-change: transform, opacity;
  }

  /* Viewer arrow boxes (left/right) */
  .viewer-arrow-box {
    position: absolute;
    width: 45px; height: 25px;
    background: #000; border: 3px solid #fff; outline: 1px solid #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 40;
    /* Game: arrow enter 25 frames (0.42s), easeOutCirc. Exit overrides inline. */
    transition: transform 0.42s var(--ease-out-circ), opacity 0.42s var(--ease-out-circ);
    will-change: transform, opacity;
    cursor: pointer;
  }
  /* Extended invisible hit zone around each arrow (mobile-friendly) */
  .viewer-arrow-box::before {
    content: '';
    position: absolute;
    top: -22px; bottom: -22px; left: -22px; right: -22px;
  }
  .viewer-arrow-box.no-transition { transition: none !important; }
  /* Game: box y = (480 - 25 - 125) / 2 = 165 → visual center 62.5px above scene center */
  #viewer-arrow-left { top: 50%; left: 80px; transform: translateY(calc(-50% - 62.5px)) translateX(-380px); }
  #viewer-arrow-right { top: 50%; left: 515px; width: 44px; transform: translateY(calc(-50% - 62.5px)) translateX(380px); }

  /* SHIFT READ prompt — game bitmap y=450 (h=30), but icon sits at bitmap y=4
     with transparent padding, so visible content floats ~5px above scene bottom */
  #shift-read-prompt {
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(calc(-50% - 17px));
    display: flex; align-items: center; gap: 8px;
    z-index: 40;
    /* Game: show 25 frames (0.42s) easeInCirc. Hide overrides to 10 frames (0.17s) inline. */
    transition: opacity 0.42s var(--ease-in-circ);
    cursor: pointer;
  }
  #shift-read-prompt .legend-icon { height: 24px; position: relative; top: 6px; left: -3px; }
  #shift-read-prompt span {
    color: #fff; font-size: 26px; letter-spacing: 1px;
    margin-left: -8px;
    position: relative;
    top: 3px;
  }
  #shift-read-prompt.has-outline span {
    /* Subtle dark outline — per-layer 0.15 (8 direction stack lands around 0.3-0.4) */
    text-shadow:
      -1px -1px 0 rgba(0,0,0,0.15), 1px -1px 0 rgba(0,0,0,0.15),
      -1px  1px 0 rgba(0,0,0,0.15), 1px  1px 0 rgba(0,0,0,0.15),
      -1px  0   0 rgba(0,0,0,0.15), 1px  0   0 rgba(0,0,0,0.15),
       0  -1px 0 rgba(0,0,0,0.15), 0    1px 0 rgba(0,0,0,0.15);
  }

  /* ── Message box (for reading descriptions) ── */
  #message-box {
    position: absolute;
    bottom: 9px; left: 18px; right: 17px;
    background: #000;
    border: 3px solid #fff;
    outline: 1px solid #000;
    color: #fff;
    padding-top: 7px;
    padding-right: 14px;
    padding-bottom: 11px;
    padding-left: 14px;
    font-size: 28px;
    word-break: keep-all;
    overflow-wrap: normal;
    line-height: 29px;
    z-index: 50;
    display: none;
    min-height: 111px;
  }
  #message-box.has-face {
    padding-left: 126px;
  }
  #message-box.active {
    display: flex; align-items: flex-start;
    transform-origin: center center;
    animation: msgOpen 0.13s ease-out forwards;
  }
  #message-box.closing {
    animation: msgClose 0.13s ease-in forwards;
  }
  /* Date label above message box (independent positioning) */
  #message-date {
    position: absolute;
    bottom: 125px; left: 18px;
    background: #000;
    border: 3px solid #fff;
    outline: 1px solid #000;
    color: #fff;
    padding: 0 8px 4px 8px;
    font-size: 28px;
    line-height: 30px;
    white-space: nowrap;
    display: none;
    z-index: 51;
    transform-origin: left center;
  }
  #message-date.active {
    display: block;
    animation: dateSlideIn 0.18s ease-out forwards;
  }
  #message-date.closing {
    animation: dateSlideOut 0.12s ease-in forwards;
  }
  @keyframes dateSlideIn {
    0% { transform: translateX(-120%) scaleY(0); }
    100% { transform: translateX(0) scaleY(1); }
  }
  @keyframes dateSlideOut {
    0% { transform: translateX(0) scaleY(1); }
    100% { transform: translateX(-120%) scaleY(0); }
  }
  @keyframes msgOpen {
    0% { transform: scaleY(0); opacity: 1; }
    100% { transform: scaleY(1); opacity: 1; }
  }
  @keyframes msgClose {
    0% { transform: scaleY(1); opacity: 1; }
    100% { transform: scaleY(0); opacity: 1; }
  }
  #message-face {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    width: 96px; height: 96px;
    image-rendering: pixelated;
    display: none;
  }
  #message-box.has-face #message-face { display: block; }
  #message-content {
    flex: 1;
    margin-top: 0;
  }
  #message-continue {
    position: absolute;
    bottom: 8px; right: 24px;
    width: 29px; height: 15px;
    image-rendering: pixelated;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body class="bs-locked">

<!-- SVG filter: replicates MV setColorTone([-80,-80,-80,255]) RGB offset (-80/255 ≈ -0.314) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="omori-tone-dark" color-interpolation-filters="sRGB">
    <feColorMatrix type="matrix" values="
      1 0 0 0 -0.3137
      0 1 0 0 -0.3137
      0 0 1 0 -0.3137
      0 0 0 1 0
    "/>
  </filter>
</svg>

<div id="scene-transition" class="active"></div>
<div id="parallax-bg"></div>
<div id="parallax-fg"></div>

<!-- Select screen background fills the whole window (outside stage) -->
<div id="select-bg"></div>

<!-- GIF pinned to window bottom, scales with stage -->
<img id="select-gif" src="" alt="">

<!-- Fade overlay sits above bg + gif but below stage so UI stays clickable -->
<div id="select-bg-fade"></div>

<!-- Select screen (scaled as one unit, cover+crop behavior) -->
<div id="select-stage">
  <!-- Album Select -->
  <div id="album-select">
    <h1>BASIL'S PHOTO ALBUM</h1>
    <div class="album-covers">
      <div class="album-cover-btn selected" data-album="dreamworld">
        <div class="stage-roller" data-album="dreamworld">
          <div class="stage-arrow stage-left" data-dir="-1"></div>
          <div class="stage-current"></div>
          <div class="stage-arrow stage-right" data-dir="1"></div>
        </div>
        <canvas id="cover-dw" width="241" height="325"></canvas>
        <div class="album-cover-label">HEADSPACE</div>
        <img class="select-cursor" src="assets/ui/cursor_menu.png" alt="">
      </div>
      <div class="album-cover-btn" data-album="faraway">
        <div class="stage-roller" data-album="faraway">
          <div class="stage-arrow stage-left" data-dir="-1"></div>
          <div class="stage-current"></div>
          <div class="stage-arrow stage-right" data-dir="1"></div>
        </div>
        <canvas id="cover-fa" width="241" height="325"></canvas>
        <div class="album-cover-label">FARAWAY TOWN</div>
        <img class="select-cursor" src="assets/ui/cursor_menu.png" alt="">
      </div>
      <div class="album-cover-btn" data-album="blackspace">
        <div class="stage-roller" data-album="blackspace">
          <div class="stage-arrow stage-left disabled" data-dir="-1"></div>
          <div class="stage-current"></div>
          <div class="stage-arrow stage-right disabled" data-dir="1"></div>
        </div>
        <canvas id="cover-bs" width="241" height="325"></canvas>
        <div class="album-cover-label">BLACKSPACE</div>
        <img class="select-cursor" src="assets/ui/cursor_menu.png" alt="">
      </div>
    </div>
    <div class="select-hint">Besides clicking, you can also use Arrow keys / WASD to navigate,<br>Z / Enter to confirm, and X / Esc to cancel!</div>
  </div>
</div>

<!-- Music toggle stays at window corner (not scaled with stage) -->
<div id="music-toggle" onclick="toggleMusic()">
  <svg viewBox="0 0 24 24" fill="white">
    <path d="M3 9v6h4l5 5V4L7 9H3z"/>
    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
  </svg>
  <div class="music-slash"></div>
</div>

<!-- "Something" eye: hidden BS unlock. Hover the top-right corner to reveal it; click to unlock the BlackSpace album. -->
<div id="something-corner" aria-hidden="true">
  <img id="something-eye" src="assets/ui/Something.png" alt="">
</div>

<!-- Legend HUD bar (fixed at window top, independent of scene positioning) -->
<div id="legend-bar">
  <div id="legend-bar-inner">
    <div class="legend-item" id="legend-read">
      READ: <img class="legend-icon" src="assets/ui/kb_shift.png" alt="SHIFT">
    </div>
    <div class="legend-item" id="legend-view">
      VIEW: <img class="legend-icon" src="assets/ui/kb_z.png" alt="Z">
    </div>
  </div>
</div>

<!-- Game Viewport -->
<div id="game-viewport">
  <div id="scene">
    <!-- Album book -->
    <div id="album-book">

// We'll use canvas crops for the arrow icons
function createArrowCanvas(frameIndex, flipX) {
  const canvas = document.createElement('canvas');
  canvas.width = 32; canvas.height = 29;
  canvas.style.imageRendering = 'pixelated';
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const img = new Image();
  img.onload = () => {
    if (flipX) {
      ctx.translate(32, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(img, frameIndex * 32, 0, 32, 29, 0, 0, 32, 29);
  };
  img.src = 'assets/ui/ACSArrows.png';
  return canvas;
}

const BGM_VOLUME = 0.6;       // target volume when fully faded in
const BGS_VOLUME = 0.5;       // ambient layer (slightly quieter than BGM)
const BGM_FADE_MS = 600;      // each fade direction

// Shared AudioContext for everything (BGM, BGS, SFX, text blips).
// Web Audio gives us gapless looping (HTMLAudioElement has a seam on loop).
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Generic looping-audio layer with crossfade between tracks. Used for BGM + BGS.
function makeAudioLayer(defaultVol) {
  const cache = {};
  let source = null;
  let gain = null;
  let currentName = null;
  function ensureGain() {
    if (gain) return;
    gain = audioCtx.createGain();
    gain.gain.value = 0;
    gain.connect(audioCtx.destination);
  }
  function stop() {
    if (source) {
      try { source.stop(); } catch (e) {}
      source.disconnect();
      source = null;
    }
  }
  function setTrack(name) {
    // Skip only when the name is unchanged AND state already matches (playing for set, silent for null)
    if (name === currentName && (source || !name)) return;
    currentName = name;
    ensureGain();
    const fadeSec = BGM_FADE_MS / 1000;
    const startSource = (buffer) => {
      if (currentName !== name) return;
      if (!musicEnabled) return; // toggleMusic re-arms when music turns on
      stop();
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.loop = true; // gapless
      src.connect(gain);
      src.start();
      source = src;
      const t = audioCtx.currentTime;
      gain.gain.cancelScheduledValues(t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(defaultVol, t + fadeSec);
    };
    const swapAndStart = () => {
      if (currentName !== name) return;
      stop();
      if (!name) return;
      if (cache[name]) startSource(cache[name]);
      else fetch(`assets/audio/${name}.ogg`)
        .then(r => r.arrayBuffer())
        .then(buf => audioCtx.decodeAudioData(buf))
        .then(buffer => { cache[name] = buffer; startSource(buffer); })
        .catch(() => {});
    };
    if (source) {
      // Crossfade: ramp current source to 0, then swap
      const now = audioCtx.currentTime;
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(gain.gain.value, now);
      gain.gain.linearRampToValueAtTime(0, now + fadeSec);
      setTimeout(swapAndStart, BGM_FADE_MS);
    } else {
      // No active source — start immediately (no fade-out delay)
      swapAndStart();
    }
  }
  return {
    setTrack, stop,
    isPlaying: () => !!source,
    getCurrent: () => currentName,
  };
}

const bgmLayer = makeAudioLayer(BGM_VOLUME);

  if (!musicEnabled || !sfxBuffers[name]) return;

  const source = audioCtx.createBufferSource();
  source.buffer = sfxBuffers[name];
  const gain = audioCtx.createGain();
  gain.gain.value = volume;
  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start(0);
}

  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start(0);
}

  }
  arrowImgRed.onload = onLoad;

  arrowImgRed.src = 'assets/ui/ACSArrows.png';

// Redraw a page-turn hand as red (active) or white (disabled)
function updatePageTurnHands() {
  if (!arrowImgRed || !arrowImgWhite) return;
  const leftDisabled = page === 0;
  const rightDisabled = page >= album.maxPages - 1;

  [[$pageTurnL, leftDisabled], [$pageTurnR, rightDisabled]].forEach(([group, disabled]) => {
    const canvas = group.querySelector('.page-turn-hand');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 32, 29);
    ctx.imageSmoothingEnabled = false;
    const frame = parseInt(canvas.dataset.frame) || 0;
    const src = disabled ? arrowImgWhite : arrowImgRed;
    ctx.drawImage(src, frame * 32, 0, 32, 29, 0, 0, 32, 29);
  });
}

  const btn = document.getElementById('music-toggle');

    // Re-arm both layers if a track is set but the source was stopped on mute
    [bgmLayer, bgsLayer].forEach(layer => {
      const n = layer.getCurrent();
      if (n && !layer.isPlaying()) layer.setTrack(n);
    });
  } else {
    bgmLayer.stop();
    bgsLayer.stop();
  }
}
