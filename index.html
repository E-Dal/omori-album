function drawKeyIcons() {
  document.querySelectorAll('.page-key-icon').forEach(canvas => {
    const img = new Image();
    img.onload = () => {
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      // strip2 = 2 frames of 24x24, use first frame (up state)
      ctx.drawImage(img, 0, 0, 24, 24, 0, 0, 24, 24);
    };
    img.src = canvas.dataset.src;
  });
}

function drawCovers() {
  const img = new Image();
  img.onload = () => {
    const cw = 241, ch = 325;
    // Atlas order in PhotoAlbumCovers.png: 0=Faraway, 1=Dreamworld, 2=BlackSpace
    const frames = {'cover-fa': 0, 'cover-dw': 1, 'cover-bs': 2};
    Object.keys(frames).forEach((id) => {
      const c = document.getElementById(id);
      if (!c) return;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, frames[id] * cw, 0, cw, ch, 0, 0, cw, ch);
    });
  };
  img.src = 'assets/ui/PhotoAlbumCovers.png';
}

// ═══════════════════════════════════════════════════
//  Main Loop (parallax + cursor animation)
// ═══════════════════════════════════════════════════
let resetParallax = () => {}; // populated when startLoop runs
let resetBsScroll = () => {}; // populated when startLoop runs
function startLoop() {
  const $fg = document.getElementById('parallax-fg');
  let parallaxX = 0;
  let lastParallaxSnap = 0;
  // BlackSpace cover scroll — drifts the select bg toward the lower-left
  // (game's Scene_OmoriTitleScreen.update: origin.x += 0.5, origin.y -= 0.5)
  let bsScrollX = 0, bsScrollY = 0;
  const $selectBg = document.getElementById('select-bg');
  resetParallax = () => { parallaxX = 0; lastParallaxSnap = 0; };
  resetBsScroll = () => { bsScrollX = 0; bsScrollY = 0; $selectBg.style.backgroundPosition = ''; };

  function tick() {

    // Parallax scroll inside an album. BlackSpace stays static for visual
    // contrast against its drifting cover bg on the select screen.
    if (state !== 'select' && album !== ALBUMS.blackspace) {
      parallaxX -= 0.1;
      const snapped = Math.round(parallaxX);
      if (snapped !== lastParallaxSnap) {
        lastParallaxSnap = snapped;
        $parallax.style.backgroundPosition = `${snapped}px 0`;
      }
    }

    // BS select cover drift — keyed off the *currently-displayed* bg image so the
    // scrolling keeps going during the fade-to-black, only stopping the moment
    // updateSelectCursor swaps to the new bg behind the fully-black overlay.
    if (state === 'select' && currentSelectBg === ALBUMS.blackspace.selectBg) {
      bsScrollX -= 0.5;
      bsScrollY += 0.5;
      $selectBg.style.backgroundPosition = `${Math.round(bsScrollX)}px ${Math.round(bsScrollY)}px`;
    }

    // Cursor bob — game-accurate (Sprite_WindowCustomCursor, Omori BASE.js L4171):
    // duration 20, speed 0.5, amplitude 0.1 × cursor_width (29px) ≈ 2.9px;
    // full sine cycle = 40 frames (~0.67s).
    cursorBobAngle = (cursorBobAngle + 0.5) % 20;
    if (state === 'browsing' && !cursorBobPaused) {
      const bobX = Math.sin(cursorBobAngle * (Math.PI / 10)) * 2.9;
      $cursor.style.marginLeft = (bobX + 8) + 'px';
    }

    // Select screen cursor bob — same sine, amp 2.9 (cursor width 29 × 0.1)
    if (state === 'select') {
      const bobY = Math.sin(cursorBobAngle * (Math.PI / 10)) * 2.9;
      document.querySelectorAll('.select-cursor').forEach(c => {
        c.style.transform = `rotate(-90deg) translateX(${-bobY}px)`;
      });
    }

    // Message continue cursor bob (same as game)
    if (state === 'message') {
      const msgHand = document.getElementById('message-continue');
      if (msgHand && msgHand.style.opacity !== '0') {
        const msgBob = Math.sin(cursorBobAngle * (Math.PI / 10)) * 2.9;
        msgHand.style.marginRight = msgBob + 'px';
      }
    }

    requestAnimationFrame(tick);
  }
  tick();
}

// ═══════════════════════════════════════════════════
//  Viewport scaling
// ═══════════════════════════════════════════════════
function updateScale() {
  // Album view: letterbox (fit). When in-album, the legend bar at the top
  // reserves `30px * scale` of vertical space, so subtract it from available height.
  // Legend height depends on scale, so iterate once: estimate, compute legend, re-solve.
  const inAlbum = document.body.classList.contains('in-album');
  let scale = Math.min(window.innerWidth / 640, window.innerHeight / 480);
  if (inAlbum) {
    const legendH = 30 * scale;
    scale = Math.min(window.innerWidth / 640, (window.innerHeight - legendH) / 480);
  }
  $scene.style.transform = `scale(${scale})`;
  document.documentElement.style.setProperty('--scale', scale);

  // Select screen: cover (fill + crop) but capped at 1 — never grow beyond natural size
  const selectScale = Math.min(1, Math.max(
    window.innerWidth / 1280,
    window.innerHeight / 720
  ));
  document.documentElement.style.setProperty('--select-scale', selectScale);
}
window.addEventListener('resize', updateScale);
updateScale();

// ═══════════════════════════════════════════════════
//  Album Select
// ═══════════════════════════════════════════════════
let currentSelectBg = '';
// Highest selectable index — capped to DW/FA when BS is locked
function maxSelectIdx() {
  return document.body.classList.contains('bs-locked') ? 1 : SELECT_KEYS.length - 1;
}

// Update both stage rollers (current label + grey out arrows at edges)
function updateStageRollers() {
  document.querySelectorAll('.stage-roller').forEach(roller => {
    const key = roller.dataset.album;
    const album = ALBUMS[key];
    const idx = stageIdx[key];
    const stages = album.stages || [];
    roller.querySelector('.stage-current').textContent = stages[idx] || '';
    roller.querySelector('.stage-left').classList.toggle('disabled', idx <= 0);
    roller.querySelector('.stage-right').classList.toggle('disabled', idx >= stages.length - 1);
  });
}

// Click-triggered stage change (used by arrows)
function changeAlbumStage(albumKey, delta) {
  const stages = ALBUMS[albumKey].stages || [];
  const next = stageIdx[albumKey] + delta;
  if (next < 0 || next >= stages.length) return;
  stageIdx[albumKey] = next;
  updateStageRollers();
  playCursorSfx();
}

// Wire up arrow clicks (once, after DOM is ready)
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.stage-arrow').forEach(arrow => {
    arrow.addEventListener('click', (e) => {
      e.stopPropagation();
      const roller = arrow.closest('.stage-roller');
      const albumKey = roller.dataset.album;
      const dir = Number(arrow.dataset.dir);
      changeAlbumStage(albumKey, dir);
    });
  });

  // Click only the cover canvas (not the label/cursor/padding) — tighter hit area
  document.querySelectorAll('.album-cover-btn').forEach((btn, i) => {
    const canvas = btn.querySelector('canvas');
    if (!canvas) return;
    canvas.style.cursor = 'pointer';
    canvas.addEventListener('click', () => {
      if (state !== 'select' || animating) return;
      if (selectIdx === i) {
        playSelectSfx();
        openAlbum(SELECT_KEYS[i]);
      } else {
        selectIdx = i;
        updateSelectCursor();
        playCursorSfx();
      }
    });
  });

  // "Something" eye click → toggle BlackSpace album visibility (persisted via localStorage)
  const $somethingEye = document.getElementById('something-eye');
  if ($somethingEye) {
    $somethingEye.addEventListener('click', () => {
      const wasLocked = document.body.classList.toggle('bs-locked'); // returns final state
      try { localStorage.setItem('bsLocked', wasLocked ? '1' : '0'); } catch (e) {}
      // If we just hid BS while it was selected, clamp the select cursor back
      if (wasLocked && selectIdx > maxSelectIdx()) {
        selectIdx = maxSelectIdx();
        updateSelectCursor();
      }
      playSelectSfx();
    });
  }

  // Page-turn arrow clicks (disabled class removes pointer-events via CSS)
  $pageTurnL.addEventListener('click', () => {
    if (state !== 'browsing' || animating) return;
    turnPage(-1);
  });
  $pageTurnR.addEventListener('click', () => {
    if (state !== 'browsing' || animating) return;
    turnPage(1);
  });

  // Legend button clicks (hidden items don't receive pointer events)
  $legendRead.addEventListener('click', () => {
    if (state !== 'browsing' || animating) return;
    const bnum = photoNumAtIdx(page * 6 + cursorIdx);
    if (bnum && photoHasText(bnum - 1)) showMessage(album.texts[bnum - 1]);
  });
  $legendView.addEventListener('click', () => {
    if (state !== 'browsing' || animating) return;
    startViewing();
  });

  // Photo slot clicks: first click moves cursor, second click (already selected) opens viewer
  $slots.addEventListener('click', (e) => {
    if (state !== 'browsing' || animating) return;
    const slot = e.target.closest('.photo-slot');
    if (!slot) return;
    const idx = Number(slot.dataset.slotIdx);
    if (cursorIdx === idx) {
      startViewing();
    } else {
      cursorIdx = idx;
      updateCursor();
      playCursorSfx();
    }
  });

  // Fullscreen viewer + message clicks (delegated on #scene)
  $scene.addEventListener('click', (e) => {
    // In reading mode, any click advances the message
    if (state === 'message') {
      advanceMessage();
      return;
    }
    const t = e.target;
    if (state === 'browsing' && !animating) {
      // Click on empty background (not on book / page-turn) → return to select screen
      if (!(t.closest && (t.closest('#album-book') || t.closest('.page-turn-group')))) {
        goBackToSelect();
      }
      return;
    }
    if (state !== 'viewing' || animating) return;

    // Arrow clicks (extended hit area via ::before pseudo-element bubbles here)
    if (t.closest && t.closest('#viewer-arrow-left')) { slideViewingPhoto(-1); return; }
    if (t.closest && t.closest('#viewer-arrow-right')) { slideViewingPhoto(1); return; }
    // Photo or SHIFT READ prompt → read (if text)
    if (t === $viewerPhoto || (t.closest && t.closest('#shift-read-prompt'))) {
      const vnum = photoNumAtIdx(viewingIdx);
      if (vnum && photoHasText(vnum - 1)) showMessage(album.texts[vnum - 1]);
      return;
    }
    // Background/empty → exit
    endViewing();
  });
});

function updateSelectCursor() {
  const btns = document.querySelectorAll('.album-cover-btn');
  btns.forEach((b, i) => b.classList.toggle('selected', i === selectIdx));

  // Switch select screen background
  const selectedAlbum = ALBUMS[SELECT_KEYS[selectIdx]];
  // BGM on cover: selectBgm overrides global default (BS uses null = silence)
  setBgm('selectBgm' in selectedAlbum ? selectedAlbum.selectBgm : 'event_maris_theme');
  // No BGS on the select screen
  setBgs(null);
  const newBg = selectedAlbum.selectBg;
  const isBs = SELECT_KEYS[selectIdx] === 'blackspace';

  if (newBg !== currentSelectBg) {
    const $sbg = document.getElementById('select-bg');
    const $sgif = document.getElementById('select-gif');
    const $sfade = document.getElementById('select-bg-fade');

    const setGif = (src) => {
      if (src) { $sgif.src = src; $sgif.style.display = ''; }
      else { $sgif.removeAttribute('src'); $sgif.style.display = 'none'; }
    };
    if (!currentSelectBg) {
      // First time — no transition
      $sbg.style.backgroundImage = `url('${newBg}')`;
      setGif(selectedAlbum.selectGif);
      currentSelectBg = newBg;
      document.body.classList.toggle('on-select-bs', isBs);
    } else {
      // Preload new GIF + bg in parallel with the fade-to-black
      const newGif = selectedAlbum.selectGif;
      const bgPreload = new Image();
      const gifReady = newGif
        ? new Promise(r => { const p = new Image(); p.onload = r; p.onerror = r; p.src = newGif; if (p.complete) r(); })
        : Promise.resolve();
      const bgReady = new Promise(r => { bgPreload.onload = r; bgPreload.onerror = r; bgPreload.src = newBg; if (bgPreload.complete) r(); });

      // Fade to black
      $sfade.classList.add('active');
      const fadeDone = new Promise(r => setTimeout(r, 250));

      Promise.all([gifReady, bgReady, fadeDone]).then(() => {
        // Everything loaded AND fade is fully black: swap under cover.
        // Toggle the BS-tile class here too so the bg-size mode change is hidden by the fade.
        $sbg.style.backgroundImage = `url('${newBg}')`;
        setGif(newGif);
        currentSelectBg = newBg;
        document.body.classList.toggle('on-select-bs', isBs);
        // If we're switching AWAY from BS, drop the lingering scroll position now (still hidden by fade)
        if (!isBs) resetBsScroll();
        // Give browser a frame to paint the new content before lifting the fade
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            $sfade.classList.remove('active');
          });
        });
      });
    }
  }
}

// ═══════════════════════════════════════════════════
//  Open Album
// ═══════════════════════════════════════════════════
// Photo filename helpers (respect thumbSuffix/fullSuffix overrides)
function thumbUrl(albumObj, num) {
  return `${albumObj.thumbPrefix}${String(num).padStart(2,'0')}${albumObj.thumbSuffix || ''}.png`;
}
function fullUrl(albumObj, num) {
  return `${albumObj.fullPrefix}${String(num).padStart(2,'0')}${albumObj.fullSuffix || ''}.png?v=2`;
}

// Given a global slot index (0 to maxPages*6 - 1), return actual photo number at that slot (0 = empty)
function photoNumAtIdx(idx) {
  if (!album || !album.pages) return 0;
  const p = Math.floor(idx / 6);
  const c = idx % 6;
  return (album.pages[p] || [])[c] || 0;
}

// Find next non-empty slot from `from` in direction dir (+1 or -1). Returns -1 if none.
function nextVisibleIdx(from, dir) {
  const total = (album?.maxPages || 0) * 6;
  let idx = from + dir;
  while (idx >= 0 && idx < total) {
    if (photoNumAtIdx(idx)) return idx;
    idx += dir;
  }
  return -1;
}

// Apply the given stage's data onto the album object (overriding pages/maxPages/prefixes).
// Albums without stageData (e.g. blackspace) still get BGM/BGS resolution.
function applyStage(albumObj, stageNum) {
  const sd = (albumObj.stageData || [])[stageNum] || {};
  // Restore original defaults first (in case prior stage overrode them)
  if (!albumObj._baseline) {
    albumObj._baseline = {
      fullPrefix: albumObj.fullPrefix,
      thumbPrefix: albumObj.thumbPrefix,
      fullSuffix: albumObj.fullSuffix || '',
      thumbSuffix: albumObj.thumbSuffix || '',
    };
  }
  albumObj.fullPrefix  = sd.fullPrefix  ?? albumObj._baseline.fullPrefix;
  albumObj.thumbPrefix = sd.thumbPrefix ?? albumObj._baseline.thumbPrefix;
  albumObj.fullSuffix  = sd.fullSuffix  ?? albumObj._baseline.fullSuffix;
  albumObj.thumbSuffix = sd.thumbSuffix ?? albumObj._baseline.thumbSuffix;
  albumObj.maxPages    = sd.maxPages    ?? albumObj.maxPages;
  albumObj.totalPhotos = sd.totalPhotos ?? albumObj.totalPhotos;
  if (sd.pages) albumObj.pages = sd.pages;
  // BGM/BGS: stage override > album default > global default
  setBgm('bgm' in sd ? sd.bgm : (albumObj.defaultBgm ?? 'event_maris_theme'));
  setBgs('bgs' in sd ? sd.bgs : (albumObj.defaultBgs ?? null));
}

function openAlbum(key) {
  album = ALBUMS[key];
  applyStage(album, stageIdx[key] || 0);
  page = 0;
  cursorIdx = 0;

  // Start loading the fg image IMMEDIATELY (before fade to black)
  // so it has time to load and paint before we reveal the scene
  const $fgEarly = document.getElementById('parallax-fg');
  if (album.parallaxFg) {
    const currentBg = $fgEarly.style.backgroundImage;
    const newBg = `url("${album.parallaxFg}")`;
    // Only update if different (matches quoted form)
    if (!currentBg.includes(album.parallaxFg)) {
      $fgEarly.style.backgroundImage = `url('${album.parallaxFg}')`;
    }
  }

  // Fade to black
  const $trans = document.getElementById('scene-transition');
  $trans.classList.add('active');

  // After fully black: switch everything and load
  setTimeout(() => {
    // Switch backgrounds
    $parallax.style.backgroundImage = `url('${album.parallax}')`;
    $parallax.style.backgroundPosition = '0 0';
    resetParallax();
    const $fg = document.getElementById('parallax-fg');
    // fg backgroundImage is already set earlier (before fade-to-black)
    if (!album.parallaxFg) $fg.style.backgroundImage = 'none';

    // Switch screens
    $select.style.display = 'none';
    document.getElementById('select-bg').style.display = 'none';
    document.getElementById('select-gif').style.display = 'none';
    $viewport.style.display = 'flex';
    // Mark in-album BEFORE updateScale so it accounts for the legend bar height
    document.body.classList.remove('on-select');
    document.body.classList.add('in-album');
    updateScale();

    // Hide book until ready
    $book.style.visibility = 'hidden';
    $pageTurnL.style.visibility = 'hidden';
    $pageTurnR.style.visibility = 'hidden';
    $cursor.style.visibility = 'hidden';

    // Load book image
    $bookBg.onload = () => {
      const bookW = $bookBg.naturalWidth;
      const bookH = $bookBg.naturalHeight;
      $book.style.width = bookW + 'px';
      $book.style.height = bookH + 'px';
      const bx = (640 - bookW) / 2;
      const by = (480 - bookH) / 2;
      $book.style.left = bx + 'px';
      $book.style.top = by + 'px';

      $pageTurnL.style.left = (bx - 64) + 'px';
      $pageTurnL.style.top = (by + 1) + 'px';
      $pageTurnR.style.left = (bx + bookW + 6) + 'px';
      $pageTurnR.style.top = (by + 1) + 'px';

      renderPage();
      updateCursor();
      $cursor.style.display = 'block';
      state = 'browsing';

      // Wait for thumbnails + page overlay + parallax bg/fg
      const allImgs = [...$slots.querySelectorAll('img'), $pageOverlay];

      // Also wait for parallax background and foreground
      const bgPromise = new Promise(r => {
        const bgTest = new Image();
        bgTest.src = album.parallax;
        bgTest.complete ? r() : bgTest.onload = r;
        bgTest.onerror = r;
      });
      const fgPromise = album.parallaxFg ? new Promise(r => {
        const fgTest = new Image();
        fgTest.src = album.parallaxFg;
        fgTest.complete ? r() : fgTest.onload = r;
        fgTest.onerror = r;
      }) : Promise.resolve();

      const imgPromises = allImgs.map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(r => { img.onload = r; img.onerror = r; });
      });

      Promise.all([...imgPromises, bgPromise, fgPromise]).then(() => {
        $book.style.visibility = '';
        $pageTurnL.style.visibility = '';
        $pageTurnR.style.visibility = '';
        $cursor.style.visibility = '';

        // Wait 2 frames to ensure CSS backgrounds are actually painted
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            $trans.classList.remove('active');
          });
        });
      });

      $legend.style.opacity = '1';
      $legend.style.transform = 'translateY(0)';
      updateLegend();
    };
    // Faraway album has slightly aged/yellowed pages
    $bookBg.classList.toggle('aged', key === 'faraway');
    $bookBg.src = album.bookImage;
    // Handle both cached and uncached: if already complete, call onload manually
    if ($bookBg.complete && $bookBg.naturalWidth > 0) {
      $bookBg.onload();
    }
  }, 280); // a hair longer than the 0.25s fade-out so the swap happens fully behind black
}

// ═══════════════════════════════════════════════════
//  Page Rendering
// ═══════════════════════════════════════════════════
function renderPage() {
  $slots.innerHTML = '';
  $pageOverlay.src = `${album.pageTextPrefix}${page + 1}.png`;

  const photos = album.pages[page] || [];
  photos.forEach((num, i) => {
    if (!num) return;
    // Hide DW PROLOGUE slot 11 easter egg until discovered
    if (isDW12Hidden() && page === 1 && i === 5) return;
    const pos = SLOT_POS[i];
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.dataset.slotIdx = i;
    // Fade-in animation for the just-revealed easter egg thumbnail
    if (justDiscoveredEgg && album === ALBUMS.dreamworld && stageIdx.dreamworld === 0 && page === 1 && i === 5) {
      slot.classList.add('fade-in-egg');
    }
    slot.style.left = pos.x + 'px';
    slot.style.top = pos.y + 'px';
    const img = document.createElement('img');
    img.src = thumbUrl(album, num);
    slot.appendChild(img);
    $slots.appendChild(slot);
  });

  // Arrow states
  $pageTurnL.classList.toggle('disabled', page === 0);
  $pageTurnR.classList.toggle('disabled', page >= album.maxPages - 1);
  updatePageTurnHands();

  // Preload fullsize photos for current page + thumbnails for adjacent pages
  (album.pages[page] || []).forEach(num => {
    if (!num) return;
    new Image().src = fullUrl(album, num);
  });
  [page - 1, page + 1].forEach(p => {
    if (p < 0 || p >= album.maxPages) return;
    (album.pages[p] || []).forEach(num => {
      if (!num) return;
      new Image().src = thumbUrl(album, num);
    });
  });
}

// ═══════════════════════════════════════════════════
//  Cursor Position
// ═══════════════════════════════════════════════════
function updateCursor() {
  const pos = SLOT_POS[cursorIdx];
  const bx = parseInt($book.style.left);
  const by = parseInt($book.style.top);
  // Game: cursor center at (pos.x - 10, pos.y + 55), cursor is 29x15
  $cursor.style.left = (bx + pos.x - 10 - 14) + 'px';
  $cursor.style.top = (by + pos.y + 55 - 7) + 'px';

  // Update legend READ visibility based on whether current photo has text
  updateLegend();
}

function updateLegend() {
  if (state === 'browsing') {
    const num = photoNumAtIdx(page * 6 + cursorIdx);
    const hasText = num > 0 && photoHasText(num - 1);
    const hasPhoto = slotHasPhoto(cursorIdx);
    $legendRead.style.visibility = hasText ? 'visible' : 'hidden';
    $legendView.style.visibility = hasPhoto ? 'visible' : 'hidden';

    // Update photo info bar with date/title (first line of first segment)
    // Photo info bar disabled
  }
}

// ═══════════════════════════════════════════════════
//  Page Turning (with animation)
// ═══════════════════════════════════════════════════
// Capture a half-page (left or right) to a canvas, including book bg, text overlay, and photos
function captureHalfPage(side) {
  const bookW = $bookBg.naturalWidth;
  const bookH = $bookBg.naturalHeight;
  const halfW = Math.floor(bookW / 2);
  const sx = side === 0 ? 0 : halfW;

  const canvas = document.createElement('canvas');
  canvas.width = halfW;
  canvas.height = bookH;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // Draw book background (cropped half)
  ctx.drawImage($bookBg, sx, 0, halfW, bookH, 0, 0, halfW, bookH);

  // Draw page text overlay (cropped half)
  if ($pageOverlay.naturalWidth) {
    ctx.globalAlpha = 0.7;
    ctx.drawImage($pageOverlay, sx, 0, halfW, bookH, 0, 0, halfW, bookH);
    ctx.globalAlpha = 1.0;
  }

  // Draw photo thumbnails from DOM
  const slotImgs = $slots.querySelectorAll('.photo-slot img');
  const photos = album.pages[page] || [];
  const startSlot = side === 0 ? 0 : 3;
  const endSlot = side === 0 ? 3 : 6;
  let imgIdx = 0;
  for (let i = 0; i < 6; i++) {
    const num = photos[i];
    if (!num) continue;
    if (i >= startSlot && i < endSlot && imgIdx < slotImgs.length) {
      const imgEl = slotImgs[imgIdx];
      if (imgEl && imgEl.complete) {
        const pos = SLOT_POS[i];
        ctx.drawImage(imgEl, pos.x - sx, pos.y, 86, 101);
      }
    }
    imgIdx++;
  }

  return canvas;
}

function waitForPageImages() {
  const imgs = $slots.querySelectorAll('.photo-slot img');
  const promises = Array.from(imgs).map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve;
    });
  });
  return Promise.all(promises);
}

function turnPage(dir) {
  const newPage = page + dir;
  if (newPage < 0 || newPage >= album.maxPages) return;
  if (animating) return;

  animating = true;
  playSfx();

  const $flip = document.getElementById('page-flip');
  const bookW = $bookBg.naturalWidth;
  const halfW = Math.floor(bookW / 2);

  // Capture BOTH halves of old page before switching
  const oldFlipCanvas = captureHalfPage(dir > 0 ? 1 : 0);
  const oldStaticCanvas = captureHalfPage(dir > 0 ? 0 : 1);

  // Put covers on FIRST (before switching content) to prevent flash
  const $cover = document.getElementById('page-static-cover');

  // Cover the non-flipping side with old content
  $cover.innerHTML = '';
  $cover.appendChild(oldStaticCanvas);
  oldStaticCanvas.style.width = halfW + 'px';
  oldStaticCanvas.style.height = '100%';
  $cover.style.left = (dir > 0 ? '0px' : halfW + 'px');
  $cover.style.width = halfW + 'px';
  $cover.style.height = '100%';
  $cover.style.display = 'block';

  // Setup flip overlay with old flipping side
  $flip.innerHTML = '';
  $flip.appendChild(oldFlipCanvas);
  oldFlipCanvas.style.width = halfW + 'px';
  oldFlipCanvas.style.height = '100%';
  $flip.style.left = (dir > 0 ? halfW + 'px' : '0px');
  $flip.style.width = halfW + 'px';
  $flip.style.transformOrigin = (dir > 0 ? 'left center' : 'right center');
  $flip.style.display = 'block';
  $flip.style.transform = 'scaleX(1)';
  $flip.style.background = 'none';

  // NOW switch content underneath (hidden by covers)
  page = newPage;
  renderPage();

  // Wait for new images to load, then capture new page for phase 2
  waitForPageImages().then(() => {
    requestAnimationFrame(() => {
    const newSide = dir > 0 ? 0 : 1;
    const newCanvas = captureHalfPage(newSide);

    let frame = 0;
    // Snappier than game's 20+15: 12+8 (0.33s total) for crisper turn feel
    const phase1Frames = 12;
    const phase2Frames = 8;
    // easeOutCirc formula from Omori BASE.js L5475
    const easeOutCirc = t => Math.sqrt(1 - (t - 1) * (t - 1));

    function animateFlip() {
      frame++;
      if (frame <= phase1Frames) {
        const t = frame / phase1Frames;
        $flip.style.transform = `scaleX(${1 - easeOutCirc(t)})`;
      } else if (frame === phase1Frames + 1) {
        // Switch to new page canvas
        $flip.innerHTML = '';
        $flip.appendChild(newCanvas);
        newCanvas.style.width = halfW + 'px';
        newCanvas.style.height = '100%';

        if (dir > 0) {
          $flip.style.left = '0px';
          $flip.style.transformOrigin = 'right center';
        } else {
          $flip.style.left = halfW + 'px';
          $flip.style.transformOrigin = 'left center';
        }
        $flip.style.transform = 'scaleX(0)';
      } else if (frame <= phase1Frames + phase2Frames + 1) {
        const t = (frame - phase1Frames - 1) / phase2Frames;
        $flip.style.transform = `scaleX(${easeOutCirc(t)})`;
      } else {
        $flip.style.display = 'none';
        $flip.innerHTML = '';
        $cover.style.display = 'none';
        $cover.innerHTML = '';
        updateCursor();
        animating = false;
        return;
      }
      requestAnimationFrame(animateFlip);
    }
    requestAnimationFrame(animateFlip);
  });
  }); // end preloadPageThumbs.then
}

// ═══════════════════════════════════════════════════
//  View Photo (full size)
// ═══════════════════════════════════════════════════
function startViewing() {
  if (!slotHasPhoto(cursorIdx)) { playBuzzerSfx(); return; }
  playSfx(); // game plays SE_turn_page on viewer open
  const globalIdx = page * 6 + cursorIdx;

  viewingIdx = globalIdx;
  state = 'viewing';
  animating = true;

  // Setup photo — use actual photo number from pages[page][slot], not slot index
  const num = photoNumAtIdx(viewingIdx);
  $viewerPhoto.src = fullUrl(album, num);

  // Show viewer
  $viewer.classList.add('active');

  // ── Set initial state (no transition yet) ──
  const isFaraway = (album === ALBUMS.faraway);
  $viewerPhoto.style.transition = 'none';
  // Game: photo starts with top edge at scene bottom (y=480), i.e. 240px below top:50% anchor
  $viewerPhoto.style.transform = 'translate(-50%, 240px)';
  $viewerPhoto.style.opacity = isFaraway ? '0' : '1';

  // Album slides out — game: duration 15 frames (0.25s), easeInCirc
  $book.style.transition = 'transform 0.25s var(--ease-in-circ), opacity 0.25s var(--ease-in-circ)';
  $book.style.transform = 'translateY(500px)';
  $book.style.opacity = '0';
  $cursor.classList.add('inactive');
  $cursor.style.transition = 'transform 0.25s var(--ease-in-circ), opacity 0.25s var(--ease-in-circ)';
  $cursor.style.transform = 'translateY(500px)';
  $cursor.style.opacity = '0';

  // Page turn controls slide down with album (same 15 frames easeInCirc)
  $pageTurnL.style.transition = 'transform 0.25s var(--ease-in-circ), opacity 0.25s var(--ease-in-circ)';
  $pageTurnR.style.transition = 'transform 0.25s var(--ease-in-circ), opacity 0.25s var(--ease-in-circ)';
  $pageTurnL.style.transform = 'translateY(500px)';
  $pageTurnR.style.transform = 'translateY(500px)';
  $pageTurnL.style.opacity = '0';
  $pageTurnR.style.opacity = '0';

  // Legend hides
  $legend.style.opacity = '0';
  $legend.style.transform = 'translateY(-100%)';
  $photoInfo.style.display = 'none';

  // Viewer arrows — start at final position but invisible, slide in together with photo
  $viewerArrowL.classList.add('no-transition');
  $viewerArrowR.classList.add('no-transition');
  $viewerArrowL.style.transform = 'translateY(calc(-50% - 62.5px)) translateX(-72px)';
  $viewerArrowR.style.transform = 'translateY(calc(-50% - 62.5px)) translateX(72px)';
  $viewerArrowL.style.opacity = '0';
  $viewerArrowR.style.opacity = '0';

  // Show SHIFT READ prompt (index texts by photo number - 1)
  const hasTextStart = photoHasText(num - 1);
  $shiftRead.style.opacity = hasTextStart ? '1' : '0';
  $shiftRead.style.pointerEvents = hasTextStart ? '' : 'none';
  $shiftRead.classList.toggle('has-outline', album.readOutline);

  // ── Debug frame-step mode ──
  if (typeof DEBUG_FRAME !== 'undefined' && DEBUG_FRAME) {
    _startViewingDebug();
    return;
  }

  // ── Normal mode: use CSS transitions (GPU-accelerated, smooth) ──
  // Force layout flush so initial state is applied, then set targets with transition
  $viewerPhoto.offsetHeight;

  // Game: photo y+opacity tween 25 frames (0.42s), easeOutCirc
  $viewerPhoto.style.transition = isFaraway
    ? 'transform 0.42s var(--ease-out-circ), opacity 0.42s var(--ease-out-circ)'
    : 'transform 0.42s var(--ease-out-circ)';
  $viewerPhoto.style.transform = 'translate(-50%, -50%)';
  $viewerPhoto.style.opacity = '1';

  // Arrows slide in at the same time
  $viewerArrowL.offsetHeight;
  $viewerArrowL.classList.remove('no-transition');
  $viewerArrowR.classList.remove('no-transition');
  $viewerArrowL.style.transition = '';
  $viewerArrowR.style.transition = '';
  updateViewerArrows();

  // Photo takes 25 frames (0.42s) + wait 5 ≈ 500ms
  setTimeout(() => { animating = false; }, 500);
}

// ── Debug: rAF frame-by-frame stepping ──
function _startViewingDebug() {
  const isFaraway = (album === ALBUMS.faraway);
  const PHOTO_DUR = 450, BOOK_DUR = 800;
  const TOTAL_DUR = Math.max(PHOTO_DUR, BOOK_DUR);

  function cubicBezier(p1x, p1y, p2x, p2y) {
    return function(t) {
      if (t <= 0) return 0;
      if (t >= 1) return 1;
      let u = t;
      for (let i = 0; i < 8; i++) {
        const x = 3*u*(1-u)*(1-u)*p1x + 3*u*u*(1-u)*p2x + u*u*u - t;
        const dx = 3*(1-u)*(1-u)*p1x + 6*u*(1-u)*(p2x-p1x) + 3*u*u*(1-p2x);
        if (Math.abs(dx) < 1e-6) break;
        u -= x / dx;
      }
      u = Math.max(0, Math.min(1, u));
      return 3*u*(1-u)*(1-u)*p1y + 3*u*u*(1-u)*p2y + u*u*u;
    };
  }
  const ease = cubicBezier(0.33, 1, 0.68, 1);
  function lerp(a, b, t) { return a + (b - a) * t; }

  const photoYStart = 20, photoYEnd = -50;
  const photoOffsetStart = -28, photoOffsetEnd = 0;
  const FRAME_MS = 1000 / 60; // ~16.67ms per frame
  let frame = 0;

  function tick() {
    const elapsed = frame * FRAME_MS;
    frame++;

    const photoT = Math.min(elapsed / PHOTO_DUR, 1);
    const photoEased = ease(photoT);
    const photoY = lerp(photoYStart, photoYEnd, photoEased);
    const photoOffset = lerp(photoOffsetStart, photoOffsetEnd, photoEased);
    const photoOpacity = isFaraway ? Math.min(elapsed / (PHOTO_DUR / 3), 1) : 1;

    $viewerPhoto.style.transform = `translate(-50%, calc(${photoY}% + ${photoOffset}px))`;
    $viewerPhoto.style.opacity = String(photoOpacity);

    const bookT = Math.min(elapsed / BOOK_DUR, 1);
    const bookEased = ease(bookT);
    const bookY = lerp(0, 500, bookEased);
    const bookOpacity = 1 - bookEased;

    $book.style.transform = `translateY(${bookY}px)`;
    $book.style.opacity = String(bookOpacity);
    $pageTurnL.style.transform = `translateY(${bookY}px)`;
    $pageTurnR.style.transform = `translateY(${bookY}px)`;
    $pageTurnL.style.opacity = String(bookOpacity);
    $pageTurnR.style.opacity = String(bookOpacity);

    console.log(`[frame ${frame}] elapsed=${elapsed.toFixed(1)}ms photoT=${photoT.toFixed(3)} photoY=${photoY.toFixed(1)}% opacity=${photoOpacity.toFixed(3)} bookY=${bookY.toFixed(1)}px`);

    if (elapsed < TOTAL_DUR) {
      _debugAnimTickFn = tick;
    } else {
      $viewerArrowL.classList.remove('no-transition');
      $viewerArrowR.classList.remove('no-transition');
      $viewerArrowL.style.transition = '';
      $viewerArrowR.style.transition = '';
      updateViewerArrows();
      animating = false;
      _debugAnimTickFn = null;
    }
  }

  tick(); // render frame 0
}

function endViewing() {
  if (animating) return;
  playCancelSfx();
  animating = true;
  state = 'browsing';
  cursorBobPaused = true; // cursor slides back from translateY(500px) to 0; pause bob

  // Easter egg discovery: exiting from photo 12 unlocks the blurry thumbnail (session-only)
  const discoveringEgg = isDW12Hidden() && viewingIdx === 11;
  if (discoveringEgg) {
    easterEgg12Discovered = true;
  }

  // Game: photo exit 15 frames (0.25s), easeInCirc
  $viewerPhoto.style.transition = 'transform 0.25s var(--ease-in-circ), opacity 0.25s var(--ease-in-circ)';
  // Game: photo exits back down to top edge at scene bottom
  $viewerPhoto.style.transform = 'translate(-50%, 240px)';
  $viewerPhoto.style.opacity = '0';

  // Game: arrows exit 15 frames (0.25s), easeOutCirc. Also fade to 0 — without
  // this they linger at full opacity off-screen until viewer.display:none and
  // pop-disappear on smaller viewports where the slide doesn't fully clear.
  $viewerArrowL.style.transition = 'transform 0.25s var(--ease-out-circ), opacity 0.25s var(--ease-out-circ)';
  $viewerArrowR.style.transition = 'transform 0.25s var(--ease-out-circ), opacity 0.25s var(--ease-out-circ)';
  $viewerArrowL.style.transform = 'translateY(calc(-50% - 62.5px)) translateX(-380px)';
  $viewerArrowR.style.transform = 'translateY(calc(-50% - 62.5px)) translateX(380px)';
  $viewerArrowL.style.opacity = '0';
  $viewerArrowR.style.opacity = '0';
  // Game: SHIFT READ hide 10 frames (0.17s) easeInCirc
  $shiftRead.style.transition = 'opacity 0.17s var(--ease-in-circ)';
  $shiftRead.style.opacity = '0';

  // Album slides back up — instantly jump opacity to 0.5, then animate to 1
  $book.style.transition = 'none';
  $book.style.opacity = '0.6';
  $pageTurnL.style.transition = 'none';
  $pageTurnR.style.transition = 'none';
  $pageTurnL.style.opacity = '0.6';
  $pageTurnR.style.opacity = '0.6';

  requestAnimationFrame(() => {
    // Game: album slides back 25 frames (0.42s), easeOutCirc
    $book.style.transition = 'transform 0.42s var(--ease-out-circ), opacity 0.42s var(--ease-out-circ)';
    $book.style.transform = 'translateY(0)';
    $book.style.opacity = '1';

    $pageTurnL.style.transition = 'transform 0.42s var(--ease-out-circ), opacity 0.42s var(--ease-out-circ)';
    $pageTurnR.style.transition = 'transform 0.42s var(--ease-out-circ), opacity 0.42s var(--ease-out-circ)';
    $pageTurnL.style.transform = 'translateY(0)';
    $pageTurnR.style.transform = 'translateY(0)';
    $pageTurnL.style.opacity = '1';
    $pageTurnR.style.opacity = '1';

    $cursor.style.transition = 'transform 0.42s var(--ease-out-circ), opacity 0.42s var(--ease-out-circ)';
    $cursor.style.transform = 'translateY(0)';
    $cursor.style.opacity = '1';
  });
  // Gray tint removed in the setTimeout below (after ~450ms) when animating=false

  // Legend shows
  $legend.style.opacity = '1';
  $legend.style.transform = 'translateY(0)';

  // Update page/cursor to match viewing index
  const newPage = Math.floor(viewingIdx / 6);
  const newCursorIdx = viewingIdx % 6;
  if (newPage !== page) {
    page = newPage;
    renderPage();
  }
  cursorIdx = newCursorIdx;

  setTimeout(() => {
    $viewer.classList.remove('active');
    updateCursor();
    // Cursor fully back: drop gray tint, resume bobbing
    $cursor.classList.remove('inactive');
    animating = false;
    cursorBobPaused = false;
    // Trigger fade-in rerender of the unlocked easter egg thumbnail
    if (discoveringEgg) {
      justDiscoveredEgg = true;
      renderPage();
      setTimeout(() => { justDiscoveredEgg = false; }, 3000);
    }
  }, 500);
}

function updateViewerArrows() {
  // Check for any non-empty slot before/after current position
  let hasPrev = nextVisibleIdx(viewingIdx, -1) >= 0;
  let hasNext = nextVisibleIdx(viewingIdx, 1) >= 0;
  // Easter egg: hide right arrow at photo 11 (pre-discovery), hide both at photo 12
  if (isDW12Hidden()) {
    if (viewingIdx === 10) hasNext = false;       // photo 11: pretend there's no next
    if (viewingIdx === 11) { hasPrev = false; hasNext = false; }  // photo 12 (easter): no arrows
  }
  // translateX(0) = at fixed left position (visible), negative/positive = off-screen
  $viewerArrowL.style.transform = hasPrev
    ? 'translateY(calc(-50% - 62.5px)) translateX(0)'
    : 'translateY(calc(-50% - 62.5px)) translateX(-380px)';
  $viewerArrowL.style.opacity = hasPrev ? '1' : '0';
  $viewerArrowL.style.pointerEvents = hasPrev ? '' : 'none';
  $viewerArrowR.style.transform = hasNext
    ? 'translateY(calc(-50% - 62.5px)) translateX(0)'
    : 'translateY(calc(-50% - 62.5px)) translateX(380px)';
  $viewerArrowR.style.opacity = hasNext ? '1' : '0';
  $viewerArrowR.style.pointerEvents = hasNext ? '' : 'none';
}

function slideViewingPhoto(dir) {
  if (animating) return;
  // Easter egg photo: no nav allowed — user must press X to exit
  if (isDW12Hidden() && viewingIdx === 11) return;
  // Skip empty slots — find next/prev slot that has a photo
  const newIdx = nextVisibleIdx(viewingIdx, dir);
  if (newIdx < 0) return;

  playSfx();
  animating = true;

  // Create a copy of the old photo underneath (stays in place, fades out)
  const oldImg = document.createElement('img');
  oldImg.src = $viewerPhoto.src;
  oldImg.style.cssText = $viewerPhoto.style.cssText;
  oldImg.style.position = 'absolute';
  oldImg.style.transform = 'translate(-50%, -50%)';
  oldImg.style.left = '50%';
  oldImg.style.top = '50%';
  oldImg.style.zIndex = '36';
  oldImg.style.imageRendering = 'pixelated';
  // Game: old photo fade 25 frames (0.42s) easeInCirc
  oldImg.style.setProperty('transition', 'opacity 0.42s cubic-bezier(0.55, 0, 1, 0.45)', 'important');
  $viewer.appendChild(oldImg);

  // Fade out old photo
  requestAnimationFrame(() => {
    oldImg.style.opacity = '0';
  });

  // New photo slides in on top from the side
  viewingIdx = newIdx;
  const num = photoNumAtIdx(viewingIdx);
  const newSrc = fullUrl(album, num);

  // Set up slide-in position first, then change src
  $viewerPhoto.style.transition = 'none';
  $viewerPhoto.style.transform = dir > 0 ? 'translate(80%, -50%)' : 'translate(-180%, -50%)';
  $viewerPhoto.style.opacity = '1';
  $viewerPhoto.style.zIndex = '37';
  $viewerPhoto.src = newSrc;

  // Game: new photo slides in 25 frames (0.42s) easeOutCirc
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      $viewerPhoto.style.transition = 'transform 0.42s cubic-bezier(0, 0.55, 0.45, 1)';
      $viewerPhoto.style.transform = 'translate(-50%, -50%)';
    });
  });

  updateViewerArrows();
  const hasTextNew = photoHasText(num - 1);
  const newShiftOpacity = hasTextNew ? '1' : '0';
  if ($shiftRead.style.opacity !== newShiftOpacity) {
    $shiftRead.style.opacity = newShiftOpacity;
  }
  $shiftRead.style.pointerEvents = hasTextNew ? '' : 'none';

  // Clean up old photo after animation (25 frames + wait 5 ≈ 500ms)
  setTimeout(() => {
    oldImg.remove();
    animating = false;
  }, 500);
}

// ═══════════════════════════════════════════════════
//  Message (READ description)
// ═══════════════════════════════════════════════════
function showMessage(boxes) {
  messageReturnTo = state;
  state = 'message';
  msgBoxes = boxes;
  msgBoxIdx = 0;
  msgLineIdx = 0;
  msgPrevLines = '';
  msgPauseActive = false;

  $msgText.innerHTML = '';
  document.getElementById('message-continue').style.opacity = '0';
  $msgBox.classList.remove('closing');
  $msgBox.classList.add('active');

  // Show date label immediately if first entry has one
  const $date = document.getElementById('message-date');
  $date.classList.remove('active');
  $date.classList.remove('closing');
  const firstEntry = boxes[0][0];
  if (firstEntry.dateLabel) {
    $date.textContent = firstEntry.dateLabel;
    $date.classList.add('active');
  }

  // Wait for open animation, then start typing
  setTimeout(() => typewriteLine(), 130);

  // In browsing mode, slide book up a bit
  if (messageReturnTo === 'browsing') {
    animating = true;                                   // suspend cursor bob during slide
    $book.style.transition = 'transform 0.3s cubic-bezier(0.33,1,0.68,1)';
    $book.style.transform = 'translateY(-55px)';
    // Hand cursor: turn gray (instant) and slide straight up with the book.
    // Don't reset marginLeft — it freezes wherever the bob was (no snap/teleport).
    $cursor.classList.add('inactive');
    $cursor.style.transition = 'transform 0.3s cubic-bezier(0.33,1,0.68,1)';
    $cursor.style.transform = 'translateY(-55px)';
    setTimeout(() => { animating = false; }, 300);      // resume bob only after slide done
    $legend.style.opacity = '0';
    $legend.style.transform = 'translateY(-100%)';
    $pageTurnL.style.opacity = '0';
    $pageTurnR.style.opacity = '0';
    $photoInfo.style.display = 'none';
  }
}

function typewriteLine() {
  const box = msgBoxes[msgBoxIdx];
  const entry = box[msgLineIdx];
  const text = entry.text;
  const isInline = entry.inline;
  // Show date label if this is the first entry of a box with a dateLabel
  const $date = document.getElementById('message-date');
  if (msgLineIdx === 0 && entry.dateLabel) {
    $date.textContent = entry.dateLabel;
    $date.classList.remove('closing');
    $date.classList.add('active');
  }

  msgTyping = true;
  document.getElementById('message-continue').style.opacity = '0';

  // Skip mode: once user skipped, show lines instantly (no typewriter)
  if (msgSkipMode) {
    const prefix = isInline && msgPrevLines ? ' ' : '';
    const fullLine = msgPrevLines + prefix + text.replace(/\n/g, '<br>');
    $msgText.innerHTML = fullLine;
    msgPrevLines = fullLine;
    const nextEntry = msgLineIdx + 1 < box.length ? box[msgLineIdx + 1] : null;
    if (nextEntry && !nextEntry.inline) msgPrevLines += '<br>';
    msgTyping = false;
    showContinueCursor();
    playTextBlip(); // single blip per line for feedback
    return;
  }

  // Pre-split into chunks
  const chunks = [];
  // If inline, add a space before the text (continues on same line)
  if (isInline && msgPrevLines) {
    chunks.push(' ');
  }
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '\n') {
      chunks.push('<br>');
    } else {
      chunks.push(text[i]);
    }
  }

  let chunkIdx = 0;
  let blipCounter = 0;
  const charsPerFrame = 1.8; // 1.8× MV default (~108 chars/sec)
  const prefix = msgPrevLines;
  const fullHtml = chunks.join('');

  cancelAnimationFrame(msgTypingTimer);
  function typeFrame() {
    // Game-accurate fast-forward: while user holds confirm/cancel/shift/click,
    // _showFast triggers and the rest of the line types instantly that frame.
    if (msgHoldFast) chunkIdx = chunks.length;
    else chunkIdx += charsPerFrame;
    if (chunkIdx > chunks.length) chunkIdx = chunks.length;
    // Show visible part + invisible remainder (preserves word-wrap positions)
    const visible = chunks.slice(0, chunkIdx).join('');
    const hidden = chunks.slice(chunkIdx).join('');
    $msgText.innerHTML = prefix + visible + '<span style="visibility:hidden">' + hidden + '</span>';

    // Play text blip
    blipCounter += charsPerFrame;
    if (blipCounter >= 2) {
      blipCounter = 0;
      playTextBlip();
    }

    if (chunkIdx >= chunks.length) {
      msgTyping = false;
      // Save accumulated text
      // If inline, no <br> at the end (next segment continues on same line or adds its own <br>)
      const separator = isInline ? ' ' : '<br>';
      const renderedText = text.replace(/\n/g, '<br>');
      const inlineSpace = (isInline && prefix) ? ' ' : '';
      msgPrevLines = prefix + inlineSpace + renderedText;
      // Only add <br> if next entry exists and is not inline
      const nextEntry = msgLineIdx + 1 < box.length ? box[msgLineIdx + 1] : null;
      if (nextEntry && !nextEntry.inline) {
        msgPrevLines += '<br>';
      }
      showContinueCursor();
    } else {
      msgTypingTimer = requestAnimationFrame(typeFrame);
    }
  }
  msgTypingTimer = requestAnimationFrame(typeFrame);
}

function advanceMessage() {
  // Inside the inter-segment pause: input is dropped (matches game's _waitCount window)
  if (msgPauseActive) return;
  // No artificial flicker animation: the natural hide-during-typing /
  // show-when-done toggle gives the "flicker" feel for free.
  if (msgTyping) {
    // First skip in this message turns on skip mode — rest types instantly
    msgSkipMode = true;
    // Skip typewriter, show full text immediately
    cancelAnimationFrame(msgTypingTimer);
    const box = msgBoxes[msgBoxIdx];
    const entry = box[msgLineIdx];
    const text = entry.text;
    const isInline = entry.inline;
    const prefix = isInline && msgPrevLines ? ' ' : '';
    const fullLine = msgPrevLines + prefix + text.replace(/\n/g, '<br>');
    $msgText.innerHTML = fullLine;
    msgPrevLines = fullLine;
    const nextEntry = msgLineIdx + 1 < box.length ? box[msgLineIdx + 1] : null;
    if (nextEntry && !nextEntry.inline) {
      msgPrevLines += '<br>';
    }
    msgTyping = false;
    showContinueCursor();
    return;
  }

  // Game-accurate: \! triggers startWait(10) = 10 frames @ 60fps = 167ms exactly.
  const SEGMENT_PAUSE = 167;
  // Hide the continue cursor immediately to give visual feedback that the click registered
  document.getElementById('message-continue').style.opacity = '0';
  msgLineIdx++;
  const box = msgBoxes[msgBoxIdx];

  const startNext = () => { msgPauseActive = false; typewriteLine(); };
  if (msgLineIdx < box.length) {
    msgPauseActive = true;
    setTimeout(startNext, SEGMENT_PAUSE);
  } else {
    // Move to next box
    msgBoxIdx++;
    if (msgBoxIdx < msgBoxes.length) {
      msgPauseActive = true;
      setTimeout(() => {
        $msgText.innerHTML = '';
        msgLineIdx = 0;
        msgPrevLines = '';
        msgSkipMode = false; // reset skip mode for new dialog box
        // Game-accurate: clearFlags resets _showFast on newPage, then isRepeated
        // re-fires every keyRepeatInterval (6 frames = 100ms) during a hold.
        msgHoldFast = false;
        msgHoldFastUnlockAt = performance.now() + 100;
        msgPauseActive = false;
        typewriteLine();
      }, SEGMENT_PAUSE);
    } else {
      // All done — same pause feel before the close animation
      msgPauseActive = true;
      setTimeout(() => { msgPauseActive = false; closeMessage(); }, SEGMENT_PAUSE);
    }
  }
}

function closeMessage() {
  cancelAnimationFrame(msgTypingTimer);
  msgTyping = false;
  msgSkipMode = false; // reset skip mode for next message
  msgPauseActive = false;

  // Clear text first, then play close animation
  $msgText.innerHTML = '';
  document.getElementById('message-continue').style.opacity = '0';
  const $date = document.getElementById('message-date');
  if ($date.classList.contains('active')) {
    // Freeze dimensions before clearing text so animation doesn't collapse
    $date.style.minWidth = $date.offsetWidth + 'px';
    $date.style.minHeight = $date.offsetHeight + 'px';
    $date.textContent = '';
    $date.classList.add('closing');
  }
  $msgBox.classList.add('closing');

  setTimeout(() => {
    state = messageReturnTo;
    $msgBox.classList.remove('active');
    $msgBox.classList.remove('closing');
    $msgBox.classList.remove('has-face');
    const $dateCleanup = document.getElementById('message-date');
    $dateCleanup.classList.remove('active');
    $dateCleanup.classList.remove('closing');
    $dateCleanup.style.minWidth = '';
    $dateCleanup.style.minHeight = '';

    if (messageReturnTo === 'browsing') {
      animating = true;                  // suspend bobbing until slide fully completes
      cursorBobPaused = true;            // cursor sliding from translateY(-55) to 0
      $book.style.transition = 'transform 0.3s cubic-bezier(0.33,1,0.68,1)';
      $book.style.transform = 'translateY(0)';
      // Cursor: stay gray while sliding back down, only become red after arriving.
      // Don't reset marginLeft — preserve the frozen position.
      $cursor.style.transition = 'transform 0.3s cubic-bezier(0.33,1,0.68,1)';
      $cursor.style.transform = 'translateY(0)';
      setTimeout(() => {
        $cursor.classList.remove('inactive');
        animating = false;               // resume bob
        cursorBobPaused = false;
      }, 300);
      $legend.style.opacity = '1';
      $legend.style.transform = 'translateY(0)';
      updateLegend();
      setTimeout(() => {
        $pageTurnL.style.opacity = '';
        $pageTurnR.style.opacity = '';
      }, 100);
    }
  }, 130);
}

// ═══════════════════════════════════════════════════
//  Go back to select
// ═══════════════════════════════════════════════════
function goBackToSelect() {
  if (animating) return;
  playCancelSfx();
  animating = true;

  // Restore the select-screen BGM for whichever album we're returning to
  // (BS cover stays silent; DW/FA cover plays event_maris_theme).
  const sel = ALBUMS[SELECT_KEYS[selectIdx]];
  setBgm('selectBgm' in sel ? sel.selectBgm : 'event_maris_theme');
  setBgs(null);

  // Fade to black
  const $trans = document.getElementById('scene-transition');
  $trans.classList.add('active');

  setTimeout(() => {
    // Hidden behind black — switch everything
    state = 'select';
    document.body.classList.add('on-select');
    document.body.classList.remove('in-album');
    updateScale();
    album = null;
    $viewport.style.display = 'none';
    $viewer.classList.remove('active');
    $cursor.style.display = 'none';
    $photoInfo.style.display = 'none';
    $select.style.display = 'flex';
    document.getElementById('select-bg').style.display = '';
    document.getElementById('select-gif').style.display = '';
    currentSelectBg = ''; // Reset so it re-applies
    updateSelectCursor();
    $parallax.style.backgroundImage = `url('assets/ui/Faraway_polaroidBG_FA_day.png')`;
    $parallax.style.backgroundPosition = '0 0';
    // Don't clear parallax-fg — keep it loaded/cached to avoid repaint delay next time
    // Reset book transforms
    $book.style.transform = '';
    $book.style.opacity = '1';
    $pageTurnL.style.transform = '';
    $pageTurnR.style.transform = '';

    // Fade back in once we're behind the black overlay
    setTimeout(() => {
      $trans.classList.remove('active');
      animating = false;
    }, 60);
  }, 280);
}

// ═══════════════════════════════════════════════════
//  Keyboard Input
// ═══════════════════════════════════════════════════
// Hold-to-fast-forward (game's _showFast). Fire ONLY on browser autorepeat
// (e.repeat=true) so a quick tap to advance doesn't accidentally fast-forward
// the next line.
const FAST_KEYS = new Set([' ', 'Enter', 'z', 'Z', 'x', 'X', 'Shift', 'Escape']);
document.addEventListener('keydown', (e) => {
  if (FAST_KEYS.has(e.key) && e.repeat && performance.now() >= msgHoldFastUnlockAt) {
    msgHoldFast = true;
  }
});
document.addEventListener('keyup', (e) => {
  if (FAST_KEYS.has(e.key)) msgHoldFast = false;
});
window.addEventListener('blur', () => { msgHoldFast = false; });
// Pointer hold-to-fast-forward: only after a 400ms press (matches keyboard autorepeat threshold)
let _pointerHoldTimer = null;
document.getElementById('scene').addEventListener('pointerdown', () => {
  if (state !== 'message') return;
  _pointerHoldTimer = setTimeout(() => {
    if (performance.now() >= msgHoldFastUnlockAt) msgHoldFast = true;
  }, 400);
});
function _clearPointerHold() {
  if (_pointerHoldTimer) { clearTimeout(_pointerHoldTimer); _pointerHoldTimer = null; }
  msgHoldFast = false;
}
document.addEventListener('pointerup', _clearPointerHold);
document.addEventListener('pointercancel', _clearPointerHold);

document.addEventListener('keydown', (e) => {
  // ── Debug frame-step: press Enter to advance one frame ──
  if (typeof DEBUG_FRAME !== 'undefined' && DEBUG_FRAME && e.key === 'Enter' && _debugAnimTickFn) {
    requestAnimationFrame(_debugAnimTickFn);
    return;
  }

  if (animating && state !== 'message' && state !== 'viewing') return;
  const key = e.key;

  // ── SELECT SCREEN ──
  if (state === 'select') {
    if (key === 'a' || key === 'A' || key === 'ArrowLeft') {
      if (selectIdx > 0) { selectIdx--; updateSelectCursor(); playCursorSfx(); }
    } else if (key === 'd' || key === 'D' || key === 'ArrowRight') {
      if (selectIdx < maxSelectIdx()) { selectIdx++; updateSelectCursor(); playCursorSfx(); }
    } else if (key === ' ' || key === 'Enter' || key === 'z' || key === 'Z') {
      e.preventDefault();
      playSelectSfx();
      openAlbum(SELECT_KEYS[selectIdx]);
    }
    return;
  }

  // ── MESSAGE ──
  if (state === 'message') {
    // Game-accurate: can't cancel out of a message, must read through it
    if (key === ' ' || key === 'Enter' || key === 'z' || key === 'Z') {
      e.preventDefault();
      advanceMessage();
    }
    return;
  }

  // ── VIEWING ──
  if (state === 'viewing') {
    if (key === 'Escape' || key === 'x' || key === 'X') {
      endViewing();
    } else if (key === 'a' || key === 'A' || key === 'ArrowLeft') {
      slideViewingPhoto(-1);
    } else if (key === 'd' || key === 'D' || key === 'ArrowRight') {
      slideViewingPhoto(1);
    } else if (key === 'Shift') {
      const vnum = photoNumAtIdx(viewingIdx);
      if (vnum && photoHasText(vnum - 1)) showMessage(album.texts[vnum - 1]);
    }
    return;
  }

  // ── BROWSING ──
  if (state === 'browsing') {
    // WASD + Arrow keys: move cursor between photos
    if (key === 'w' || key === 'W' || key === 'ArrowUp') {
      const target = getNavTarget('up');
      if (target !== undefined) { cursorIdx = target; updateCursor(); playCursorSfx(); }
    } else if (key === 's' || key === 'S' || key === 'ArrowDown') {
      const target = getNavTarget('down');
      if (target !== undefined) { cursorIdx = target; updateCursor(); playCursorSfx(); }
    } else if (key === 'a' || key === 'A' || key === 'ArrowLeft') {
      // Game logic: right page (3,4,5) → left page (0,1,2)
      // Left middle (1) → left top (0)
      // Left top/bottom (0,2) → turn page left, keep position
      if (cursorIdx >= 3) {
        cursorIdx = cursorIdx - 3; updateCursor(); playCursorSfx();
      } else if (cursorIdx === 1) {
        cursorIdx = 0; updateCursor(); playCursorSfx();
      } else if (cursorIdx === 0 || cursorIdx === 2) {
        turnPage(-1);
      }
    } else if (key === 'd' || key === 'D' || key === 'ArrowRight') {
      // Game logic: left page (0,1,2) → right page (3,4,5)
      // Right top/bottom (3,5) → right middle (4)
      // Right middle (4) → turn page right, keep position
      if (cursorIdx < 3) {
        const target = cursorIdx + 3;
        // Block right-nav onto the easter egg slot (DW PROLOGUE page 2, slot 5)
        if (isDW12Hidden() && page === 1 && target === 5) {
          // stay put — the slot is "not there" in the original game
        } else {
          cursorIdx = target; updateCursor(); playCursorSfx();
        }
      } else if (cursorIdx === 3 || cursorIdx === 5) {
        cursorIdx = 4; updateCursor(); playCursorSfx();
      } else if (cursorIdx === 4) {
        turnPage(1);
      }
    // Q/E: page turning
    } else if (key === 'q' || key === 'Q') {
      turnPage(-1);
    } else if (key === 'e' || key === 'E') {
      turnPage(1);
    } else if (key === ' ' || key === 'Enter' || key === 'z' || key === 'Z') {
      e.preventDefault();
      startViewing();
    } else if (key === 'Shift') {
      const bnum = photoNumAtIdx(page * 6 + cursorIdx);
      if (bnum && photoHasText(bnum - 1)) showMessage(album.texts[bnum - 1]);
    } else if (key === 'Escape' || key === 'x' || key === 'X') {
      goBackToSelect();
    }
    return;
  }
});
</script>
